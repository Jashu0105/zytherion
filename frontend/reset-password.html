<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Zytherion AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #070a13 0%, #02040a 100%);
            --glass-bg: rgba(15, 23, 42, 0.45);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent: #d1a85c;
            --accent-glow: rgba(209, 168, 92, 0.15);
            --input-bg: rgba(4, 6, 10, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(209, 168, 92, 0.03) 0%, transparent 35%),
                radial-gradient(circle at 85% 85%, rgba(99, 102, 241, 0.04) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 50px 40px;
            z-index: 10;
            margin: 20px;
        }

        .logo-wrapper {
            width: 60px;
            height: 60px;
            background: #ffffff;
            border-radius: 12px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border: 1px solid var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #f87171;
            color: #f87171;
        }

        .alert.success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid #34d399;
            color: #34d399;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            outline: none;
            font-size: 15px;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            width: 100%;
            height: 48px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: #02040a;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px var(--accent-glow);
            margin-top: 10px;
        }

        .btn:hover {
            opacity: 0.95;
            box-shadow: 0 6px 20px rgba(209, 168, 92, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }

        .back-link a {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-wrapper">✨</div>
    <h1>Create New Password</h1>
    <p class="subtitle">Enter your new password below.</p>

    <div class="alert" id="alert"></div>

    <form onsubmit="handleResetPassword(event)">
        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="password" placeholder="••••••••" required minlength="8">
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="8">
        </div>

        <button type="submit" class="btn" id="submitBtn">Reset Password</button>

        <div class="back-link">
            <a onclick="window.location.href='login.html'">← Back to Login</a>
        </div>
    </form>
</div>

<script>
    const API_URL = "https://aegisai-backend-ifvc.onrender.com";

    function showAlert(msg, type) {
        const alert = document.getElementById("alert");
        alert.textContent = msg;
        alert.className = `alert ${type}`;
        alert.style.display = "block";
    }

    function getTokenFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get("token");
    }

    async function handleResetPassword(event) {
        event.preventDefault();

        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        const token = getTokenFromURL();

        if (!token) {
            showAlert("Invalid reset link", "error");
            return;
        }

        if (password !== confirmPassword) {
            showAlert("Passwords do not match", "error");
            return;
        }

        if (password.length < 8) {
            showAlert("Password must be at least 8 characters", "error");
            return;
        }

        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.textContent = "Resetting...";

        try {
            const res = await fetch(`${API_URL}/api/auth/reset-password`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    token: token,
                    password: password 
                })
            });

            const data = await res.json();

            if (!res.ok) {
                showAlert(data.message || "Reset failed", "error");
                btn.disabled = false;
                btn.textContent = "Reset Password";
                return;
            }

            showAlert("✅ Password reset successful! Redirecting to login...", "success");
            setTimeout(() => {
                window.location.href = "login.html";
            }, 2000);

        } catch (err) {
            showAlert("Connection error", "error");
            btn.disabled = false;
            btn.textContent = "Reset Password";
        }
    }

    // Check if token exists
    window.addEventListener("load", () => {
        const token = getTokenFromURL();
        if (!token) {
            showAlert("⚠️ Invalid or missing reset token", "error");
        }
    });
</script>

</body>
</html>
