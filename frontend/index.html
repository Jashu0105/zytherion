<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zytherion Mainframe</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<script>
  const token = localStorage.getItem("token");
  if (!token) {
    window.location.href = "login.html";
  }
</script>

<div class="app">

    <!-- High-Performance Global Header -->
    <div class="header">
        <h1>Zytherion</h1>
        <span>Quantum Mainframe Active</span>
    </div>

    <!-- Active Message Stream Stream -->
    <div id="chat-container">
        <div class="message bot">
            Hello 👋 I am Zytherion. Core operations online. Search matrices fully initialized. How can I assist you today?
        </div>
    </div>

    <!-- Floating Dock Controls -->
    <div class="input-area">
        <input 
            type="text" 
            id="user-input" 
            placeholder="Transmit command strings or messages..." 
            autocomplete="off"
        />
        <button id="send-btn">Send</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
