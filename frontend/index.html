<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zytherion Mainframe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #070a13 0%, #02040a 100%);
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent: #d1a85c;
            --accent-glow: rgba(209, 168, 92, 0.15);
            --chat-user-bg: rgba(209, 168, 92, 0.12);
            --chat-bot-bg: rgba(255, 255, 255, 0.02);
            --sidebar-bg: rgba(10, 15, 30, 0.7);
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(15, 23, 42, 0.06);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #b89146;
            --accent-glow: rgba(184, 145, 70, 0.08);
            --chat-user-bg: rgba(184, 145, 70, 0.12);
            --chat-bot-bg: rgba(15, 23, 42, 0.03);
            --sidebar-bg: rgba(241, 245, 249, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: background 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s ease, color 0.2s ease;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Navigation Layout */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            z-index: 10;
        }

        .sidebar-header {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            padding-left: 12px;
            margin-bottom: 16px;
        }

        .local-history-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .local-history-container::-webkit-scrollbar {
            width: 4px;
        }
        .local-history-container::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 2px;
        }

        .history-item {
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-main);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: transparent;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: var(--glass-bg);
            border-color: var(--glass-border);
        }

        /* Main App Workspace Architecture */
        .main-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
        }

        .top-bar {
            height: 70px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--glass-border);
        }

        .brand-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 19px;
            font-weight: 600;
            letter-spacing: -0.3px;
            user-select: none;
        }

        .brand-title img {
            display: block;
        }

        .brand-title span {
            color: var(--text-main);
        }

        .brand-title span em {
            font-style: normal;
            color: var(--accent);
        }

        .controls-group {
            display: flex;
            gap: 12px;
        }

        .ui-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ui-btn:hover {
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* Chat Streams Container */
        .chat-viewports {
            flex: 1;
            overflow-y: auto;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .chat-viewports::-webkit-scrollbar {
            width: 6px;
        }
        .chat-viewports::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 3px;
        }

        .message {
            max-width: 80%;
            padding: 16px 22px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .message.user {
            background: var(--chat-user-bg);
            border: 1px solid var(--glass-border);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            background: var(--chat-bot-bg);
            border: 1px solid var(--glass-border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        /* Input Deck Frame Area */
        .input-dock {
            padding: 20px 60px 10px 60px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-wrapper {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 8px;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            padding: 12px 16px;
            font-size: 15px;
        }

        .send-action-btn {
            background: var(--accent);
            color: #02040a;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        /* Footer Utilities / Support & Disclaimer System */
        .workspace-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px 12px 4px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .support-link {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .support-link:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .disclaimer-tag {
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">Local Workspaces</div>
        <div class="local-history-container" id="localHistory">
            </div>
        <button class="ui-btn" id="clearLogsBtn" style="margin-top: auto; justify-content: center; font-size: 12px;">
            Clear Local Logs
        </button>
    </div>

    <div class="main-workspace">
        <div class="top-bar">
            <div class="brand-title">
                <img src="logo.svg" alt="Zytherion Logo" style="width: 28px; height: 28px;">
                <span>Zytherion <em>AI</em></span>
            </div>
            <div class="controls-group">
                <button class="ui-btn" id="themeToggleBtn">🌓 Toggle Theme</button>
                <button class="ui-btn" id="logoutBtn" style="color: #ef4444; border-color: rgba(239, 68, 68, 0.15);">Logout</button>
            </div>
        </div>

        <div class="chat-viewports" id="chat-container">
            </div>

        <div class="input-dock">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Transmit command strings or messages..." autocomplete="off">
                <button class="send-action-btn" id="send-btn">Send</button>
            </div>
            
            <div class="workspace-footer">
                <a href="mailto:zytherionai@gmail.com" class="support-link">Contact Support</a>
                <div class="disclaimer-tag">Zytherion is an AI and may make mistakes.</div>
            </div>
        </div>
    </div>

    <script>
        // Core Visual State Management (Theme Execution)
        const themeToggleBtn = document.getElementById("themeToggleBtn");
        const savedTheme = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", savedTheme);

        themeToggleBtn.addEventListener("click", () => {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            const newTheme = currentTheme === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", newTheme);
            localStorage.setItem("theme", newTheme);
        });

        // Authentication Eviction Routing
        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("token");
            window.location.href = "login.html";
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
