<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zytherion AI — Authentication Mainframe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #070a13 0%, #02040a 100%);
            --glass-bg: rgba(15, 23, 42, 0.45);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent: #d1a85c;
            --accent-glow: rgba(209, 168, 92, 0.15);
            --input-bg: rgba(255, 255, 255, 0.02);
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(15, 23, 42, 0.06);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #b89146;
            --accent-glow: rgba(184, 145, 70, 0.08);
            --input-bg: rgba(15, 23, 42, 0.02);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: background 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s ease, color 0.2s ease;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .ui-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .ui-btn:hover {
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .auth-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            animation: cardFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            text-align: center;
        }

        .brand-logo {
            width: 48px;
            height: 48px;
            display: block;
        }

        .brand-title {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .brand-title em {
            font-style: normal;
            color: var(--accent);
        }

        .brand-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding-left: 2px;
        }

        .input-field {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            outline: none;
            color: var(--text-main);
            padding: 14px 16px;
            font-size: 15px;
            border-radius: 10px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 14px var(--accent-glow);
        }

        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-container .input-field {
            padding-right: 46px;
        }

        .toggle-visibility-btn {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }

        .toggle-visibility-btn:hover {
            color: var(--text-main);
        }

        .submit-btn {
            width: 100%;
            background: var(--accent);
            color: #02040a;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .submit-btn:hover {
            opacity: 0.95;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .auth-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        .msg-alert {
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            word-break: break-word;
        }

        .msg-alert.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="ui-btn" id="themeToggleBtn">🌓 Theme</button>
    </div>

    <div class="auth-card">
        <div class="brand-header">
            <img class="brand-logo" src="logo.svg" alt="Zytherion Logo">
            <div class="brand-title">
                Zytherion <span><em>AI</em></span>
                <div class="brand-subtitle">Access Core Operations Mainframe</div>
            </div>
        </div>

        <div class="msg-alert error" id="errorBox"></div>

        <form id="loginForm" onsubmit="executeAuthentication(event)">
            <div class="form-group">
                <label class="form-label">Email Matrix String</label>
                <input class="input-field" type="email" id="email" placeholder="name@domain.com" required autocomplete="username">
            </div>
            
            <div class="form-group" style="margin-bottom: 28px;">
                <label class="form-label">Secure Passkey Phrase</label>
                <div class="password-container">
                    <input class="input-field" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-visibility-btn" id="togglePassword" title="Toggle Visibility">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <button class="submit-btn" type="submit">Initialize Session</button>
        </form>

        <div class="auth-footer">
            New operator node? <a class="auth-link" href="register.html">Register Terminal</a>
        </div>
    </div>

    <script>
        // Core Visual State Management
        const themeToggleBtn = document.getElementById("themeToggleBtn");
        const savedTheme = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", savedTheme);

        themeToggleBtn.addEventListener("click", () => {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            const newTheme = currentTheme === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", newTheme);
            localStorage.setItem("theme", newTheme);
        });

        // Passkey Visibility Controller
        const passwordInput = document.getElementById("password");
        const togglePasswordBtn = document.getElementById("togglePassword");
        const eyeIcon = document.getElementById("eyeIcon");

        togglePasswordBtn.addEventListener("click", () => {
            const isCurrentlyHidden = passwordInput.getAttribute("type") === "password";
            if (isCurrentlyHidden) {
                passwordInput.setAttribute("type", "text");
                eyeIcon.innerHTML = `<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/><line x1="1" y1="1" x2="23" y2="23"/>`;
            } else {
                passwordInput.setAttribute("type", "password");
                eyeIcon.innerHTML = `<path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/>`;
            }
        });

        // Authentication Controller Pipeline
        async function executeAuthentication(event) {
            event.preventDefault();
            
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const errorBox = document.getElementById("errorBox");
            
            errorBox.style.display = "none";

            // STRATEGY: Switch the commented blocks below depending on your backend configuration definitions.
            
            // CONFIGURATION VARIANT A: Standard API route endpoint
            const AUTH_URL = "https://aegisai-backend-ifvc.onrender.com/api/login";

            // CONFIGURATION VARIANT B: Root fallback path endpoint (Uncomment below if Variant A gives a 404)
            // const AUTH_URL = "https://aegisai-backend-ifvc.onrender.com/";

            try {
                const response = await fetch(AUTH_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                // Intercept any non-JSON HTML payloads cleanly before parsing
                const contentType = response.headers.get("content-type");
                if (!contentType || !contentType.includes("application/json")) {
                    throw new Error("Mismatched backend data route configuration. Try switching the AUTH_URL variant inside line 230 of your login.html file.");
                }

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || "Access denied. Invalid credentials string match.");
                }

                localStorage.setItem("token", data.token);
                window.location.href = "index.html";

            } catch (error) {
                errorBox.innerText = error.message;
                errorBox.style.display = "block";
                console.error("Auth Exception Layer Error:", error);
            }
        }
    </script>
</body>
</html>
