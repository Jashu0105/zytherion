<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zytherion AI - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080c14;
            --card-glass: rgba(13, 22, 38, 0.7);
            --border-glow: rgba(255, 255, 255, 0.05);
            --border-focus: rgba(197, 160, 89, 0.4);
            --brand-primary: linear-gradient(135deg, #dfc07d 0%, #6366f1 50%, #9063f1 100%);
            --user-gradient: linear-gradient(135deg, #312e81 0%, #1e1b4b 100%);
            --bot-gradient: rgba(17, 27, 47, 0.85);
            --text-pure: #ffffff;
            --text-smooth: #f1f5f9;
            --text-muted: #64748b;
            --text-gold: #c5a059;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-smooth);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(197, 160, 89, 0.05) 0%, transparent 35%),
                radial-gradient(circle at 85% 85%, rgba(99, 102, 241, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(8, 12, 20, 1) 0%, transparent 100%);
            z-index: 0;
        }

        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 10%, rgba(197, 160, 89, 0.02) 0%, transparent 50%);
            animation: gentlePulse 8s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gentlePulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .auth-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 24px;
            z-index: 10;
        }

        .auth-card {
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: 45px 35px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
        }

        .auth-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 20%;
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(197, 160, 89, 0.3), transparent);
        }

        .auth-card h2 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #c5a059 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 35px;
        }

        .error-alert {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .error-alert.show {
            display: block;
        }

        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-gold);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .auth-input {
            width: 100%;
            padding: 15px 18px;
            background: rgba(4, 6, 10, 0.5);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            color: var(--text-pure);
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        .auth-input:focus {
            border-color: var(--text-gold);
            box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.15);
        }

        .auth-input::placeholder {
            color: var(--text-muted);
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #c5a059 0%, #9a7836 100%);
            color: var(--text-pure);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-shadow: 0 8px 20px -6px rgba(197, 160, 89, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .auth-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px -6px rgba(197, 160, 89, 0.45);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .social-divider {
            margin: 24px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .social-divider::before,
        .social-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-glow);
        }

        .social-login {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 1px solid var(--border-glow);
            background: rgba(4, 6, 10, 0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.2s ease;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--text-gold);
            transform: translateY(-2px);
        }

        .social-btn:active {
            transform: translateY(0);
        }

        .auth-footer {
            margin-top: 28px;
            font-size: 13.5px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--text-gold);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .signup-section {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border-glow);
            text-align: center;
        }

        .signup-section p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .signup-btn {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            background: transparent;
            color: var(--text-pure);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .signup-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-gold);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }

            .auth-card h2 {
                font-size: 24px;
            }

            .auth-btn {
                font-size: 14px;
                padding: 14px;
            }

            .social-btn {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Login</h2>
        <p class="auth-subtitle">LOG IN TO YOUR ACCOUNT</p>

        <div id="errorAlert" class="error-alert"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    class="auth-input" 
                    placeholder="Enter your email"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    class="auth-input" 
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="auth-btn" id="loginBtn">
                <span>Login</span>
            </button>
        </form>

        <!-- Social Login Section -->
        <div class="social-divider">OR LOGIN WITH SOCIAL PLATFORMS</div>
        <div class="social-login">
            <button type="button" class="social-btn" title="Login with Google" onclick="alert('🔜 Coming Soon! Google OAuth integration (Phase 7)')">
                🔵
            </button>
            <button type="button" class="social-btn" title="Login with GitHub" onclick="alert('🔜 Coming Soon! GitHub OAuth integration (Phase 7)')">
                ⚫
            </button>
            <button type="button" class="social-btn" title="Login with LinkedIn" onclick="alert('🔜 Coming Soon! LinkedIn OAuth integration (Phase 7)')">
                🔷
            </button>
        </div>

        <div class="auth-footer">
            <a href="#" onclick="alert('🔜 Coming Soon! Password reset (Phase 6)'); return false;">Forgot password?</a>
        </div>

        <div class="signup-section">
            <p>Don't have an account?</p>
            <button type="button" class="signup-btn" onclick="goToSignup()">Create New Account</button>
        </div>
    </div>
</div>

<script>
    // BACKEND URL
    const BACKEND_URL = "https://aegisai-backend-ifvc.onrender.com";

    function showError(message) {
        const alert = document.getElementById("errorAlert");
        alert.textContent = "❌ " + message;
        alert.classList.add("show");
        setTimeout(() => alert.classList.remove("show"), 5000);
    }

    function setButtonLoading(loading) {
        const btn = document.getElementById("loginBtn");
        const span = btn.querySelector("span");
        if (loading) {
            btn.disabled = true;
            span.innerHTML = '<span class="spinner"></span> Logging in...';
        } else {
            btn.disabled = false;
            span.textContent = "Login";
        }
    }

    async function handleLogin(event) {
        event.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
            showError("Please enter both email and password");
            return;
        }

        setButtonLoading(true);

        try {
            const response = await fetch(`${BACKEND_URL}/api/auth/login`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (!response.ok) {
                showError(data.message || "Login failed");
                setButtonLoading(false);
                return;
            }

            localStorage.setItem("token", data.accessToken);
            if (data.refreshToken) {
                localStorage.setItem("refreshToken", data.refreshToken);
            }

            window.location.href = "index.html";

        } catch (error) {
            showError("Connection error. Check your internet.");
            setButtonLoading(false);
        }
    }

    function goToSignup() {
        alert("To create an account, contact: zytherionai@gmail.com");
    }

    // Enter key support
    document.getElementById("password").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            handleLogin(new Event('submit'));
        }
    });
</script>

</body>
</html>
