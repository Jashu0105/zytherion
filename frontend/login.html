<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zytherion Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Zytherion Login</h2>
    <p class="auth-subtitle">Welcome back. Enter your credentials to access your workspace.</p>

    <form id="login-form">
      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="auth-input" placeholder="name@example.com" autocomplete="email" required />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="auth-input" placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <button type="submit" class="auth-btn">Sign In</button>
    </form>

    <p class="auth-footer">Don't have an account? <a href="register.html">Register here</a></p>
  </div>
</div>

<script>
document.getElementById("login-form").addEventListener("submit", function (event) {
  event.preventDefault();
  login();
});

async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Please enter both your email and password.");
    return;
  }

  try {
   // Replace your old fetch line with this:
const response = await fetch(LOGIN_URL, {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({ email: emailValue, password: passwordValue }) 
    // Note: Keep your original variable names inside JSON.stringify if they aren't emailValue/passwordValue!
});

    const data = await response.json();

    if (response.ok) {
      localStorage.setItem("token", data.token);
      window.location.href = "index.html"; 
    } else {
      alert(data.message || "Login failed. Please check your credentials.");
    }
  } catch (error) {
    alert("Unable to connect to the server. Please verify your node process is running on port 3000.");
  }
}
</script>
</body>
</html>
