<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zytherion AI - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080c14;
            --card-glass: rgba(13, 22, 38, 0.7);
            --border-glow: rgba(255, 255, 255, 0.05);
            --border-focus: rgba(197, 160, 89, 0.4);
            --brand-primary: linear-gradient(135deg, #dfc07d 0%, #6366f1 50%, #9063f1 100%);
            --text-pure: #ffffff;
            --text-smooth: #f1f5f9;
            --text-muted: #64748b;
            --text-gold: #c5a059;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-smooth);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(197, 160, 89, 0.05) 0%, transparent 35%),
                radial-gradient(circle at 85% 85%, rgba(99, 102, 241, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(8, 12, 20, 1) 0%, transparent 100%);
            z-index: 0;
        }

        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 10%, rgba(197, 160, 89, 0.02) 0%, transparent 50%);
            animation: gentlePulse 8s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gentlePulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 24px;
            z-index: 10;
        }

        .auth-card {
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: 45px 35px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
        }

        .auth-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 20%;
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(197, 160, 89, 0.3), transparent);
        }

        .logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #dfc07d 0%, #6366f1 50%, #9063f1 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        h2 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #c5a059 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 35px;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-gold);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        input {
            width: 100%;
            padding: 15px 18px;
            background: rgba(4, 6, 10, 0.5);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            color: var(--text-pure);
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--text-gold);
            box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.15);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #c5a059 0%, #9a7836 100%);
            color: var(--text-pure);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-shadow: 0 8px 20px -6px rgba(197, 160, 89, 0.3);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px -6px rgba(197, 160, 89, 0.45);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            margin: 24px 0;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: var(--border-glow);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .social-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 24px;
        }

        .social-btn {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            border: 1px solid var(--border-glow);
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.2s ease;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--text-gold);
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 28px;
            font-size: 13.5px;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--text-gold);
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .signup-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-glow);
            font-size: 13px;
        }

        .signup-section p {
            margin-bottom: 12px;
        }

        .signup-btn {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            background: transparent;
            color: var(--text-pure);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .signup-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-gold);
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }

            h2 {
                font-size: 24px;
            }

            .btn {
                font-size: 14px;
                padding: 14px;
            }

            .social-btn {
                width: 48px;
                height: 48px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="auth-card">
        <div class="logo">🚀</div>
        
        <h2>Login</h2>
        <p class="subtitle">LOG IN TO YOUR ACCOUNT</p>

        <div class="error-msg" id="errorMsg"></div>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn" id="submitBtn">Login</button>
        </form>

        <div class="divider">OR LOGIN WITH SOCIAL PLATFORMS</div>

        <div class="social-buttons">
            <button class="social-btn" title="Google" onclick="comingSoon('Google OAuth')">
                G
            </button>
            <button class="social-btn" title="GitHub" onclick="comingSoon('GitHub OAuth')">
                GH
            </button>
            <button class="social-btn" title="LinkedIn" onclick="comingSoon('LinkedIn OAuth')">
                 LI
            </button>
        </div>

        <div class="footer">
<a onclick="window.location.href='forgot-password.html'; return false;">Forgot password?</a>
        </div>

        <div class="signup-section">
            <p>Don't have an account?</p>
            <button class="signup-btn" onclick="comingSoon('Sign Up')">Create New Account</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://aegisai-backend-ifvc.onrender.com";

    function showError(msg) {
        const el = document.getElementById("errorMsg");
        el.textContent = "❌ " + msg;
        el.classList.add("show");
    }

    function hideError() {
        document.getElementById("errorMsg").classList.remove("show");
    }

    async function handleLogin(e) {
        e.preventDefault();
        hideError();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("submitBtn");

        if (!email || !password) {
            showError("Please enter email and password");
            return;
        }

        btn.disabled = true;
        btn.textContent = "Logging in...";

        try {
            const res = await fetch(`${API_URL}/api/auth/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (!res.ok) {
                showError(data.message || "Login failed");
                btn.disabled = false;
                btn.textContent = "Login";
                return;
            }

            localStorage.setItem("token", data.accessToken);
            if (data.refreshToken) {
                localStorage.setItem("refreshToken", data.refreshToken);
            }

            window.location.href = "index.html";

        } catch (err) {
            showError("Connection error. Check internet.");
            btn.disabled = false;
            btn.textContent = "Login";
        }
    }

    function comingSoon(feature) {
        alert(`🔜 ${feature} coming in next phase!`);
    }

    document.getElementById("password").addEventListener("keypress", (e) => {
        if (e.key === "Enter") document.querySelector("form").dispatchEvent(new Event("submit"));
    });
</script>

</body>
</html>
