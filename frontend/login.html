<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zytherion AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #070a13 0%, #02040a 100%);
            --glass-bg: rgba(15, 23, 42, 0.45);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent: #d1a85c;
            --accent-glow: rgba(209, 168, 92, 0.15);
            --input-bg: rgba(255, 255, 255, 0.02);
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(15, 23, 42, 0.06);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #b89146;
            --accent-glow: rgba(184, 145, 70, 0.08);
            --input-bg: rgba(15, 23, 42, 0.02);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: background 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s ease, color 0.2s ease;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
            position: relative;
        }

        /* Fixed Top Bar Layout Grid Alignment */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
        }

        .ui-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-decoration: none;
        }

        .ui-btn:hover {
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
            color: var(--text-main);
        }

        .auth-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            width: 100%;
            max-width: 440px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            animation: cardFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
            margin-top: 60px;
            margin-bottom: 40px;
        }

        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            text-align: center;
        }

        .brand-logo {
            width: 48px;
            height: 48px;
            display: block;
        }

        .brand-title {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .brand-title em {
            font-style: normal;
            color: var(--accent);
        }

        .brand-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding-left: 2px;
        }

        .input-field {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            outline: none;
            color: var(--text-main);
            padding: 12px 16px;
            font-size: 15px;
            border-radius: 10px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 14px var(--accent-glow);
        }

        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-container .input-field {
            padding-right: 46px;
        }

        .toggle-visibility-btn {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }

        .toggle-visibility-btn:hover {
            color: var(--text-main);
        }

        .submit-btn {
            width: 100%;
            background: var(--accent);
            color: #02040a;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .submit-btn:hover {
            opacity: 0.95;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .auth-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        .msg-alert {
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            word-break: break-word;
            line-height: 1.5;
        }

        .msg-alert.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .msg-alert.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="mailto:zytherionai@gmail.com?subject=Platform%20Feedback%20-%20Authentication%20Gateway" class="ui-btn" title="Submit Platform Feedback">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>Feedback</span>
        </a>
        <button class="ui-btn" id="themeToggleBtn">🌓 Theme</button>
    </div>

    <div class="auth-card">
        <div class="brand-header">
            <img class="brand-logo" src="logo.svg" alt="Zytherion Logo">
            <div class="brand-title" id="mainframeTitle">Zytherion <span><em>AI</em></span></div>
            <div class="brand-subtitle" id="mainframeSubtitle">Create New Account</div>
        </div>

        <div class="msg-alert" id="statusBox"></div>

        <form id="authForm" onsubmit="handleFormSubmission(event)">
            <div class="form-group" id="usernameGroup">
                <label class="form-label">User Name</label>
                <input class="input-field" type="text" id="username" placeholder="User Name" autocomplete="name">
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input class="input-field" type="email" id="email" placeholder="name@domain.com" required autocomplete="email">
            </div>
            
            <div class="form-group">
                <label class="form-label" id="passwordLabel">Create Secure Passkey</label>
                <div class="password-container">
                    <input class="input-field" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-visibility-btn" id="togglePassword" title="Toggle Visibility">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <div class="form-group" id="confirmPasswordGroup" style="margin-bottom: 26px;">
                <label class="form-label">Confirm Your Password</label>
                <div class="password-container">
                    <input class="input-field" type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password">
                    <button type="button" class="toggle-visibility-btn" id="toggleConfirmPassword" title="Toggle Visibility">
                        <svg id="confirmEyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <button class="submit-btn" type="submit" id="submitActionBtn">Register</button>
        </form>

        <div class="auth-footer" id="formFooterState">
            Already a registered user? <a class="auth-link" onclick="toggleFormMode('login')">Login</a>
        </div>
    </div>

    <script>
        // Core Visual State Management
        const themeToggleBtn = document.getElementById("themeToggleBtn");
        const savedTheme = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", savedTheme);

        themeToggleBtn.addEventListener("click", () => {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            const newTheme = currentTheme === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", newTheme);
            localStorage.setItem("theme", newTheme);
        });

        // Passkey Character Field Toggle Controllers
        function setupPasswordToggle(inputElementId, buttonElementId, iconElementId) {
            const input = document.getElementById(inputElementId);
            const btn = document.getElementById(buttonElementId);
            const icon = document.getElementById(iconElementId);

            btn.addEventListener("click", () => {
                const isHidden = input.getAttribute("type") === "password";
                if (isHidden) {
                    input.setAttribute("type", "text");
                    icon.innerHTML = `<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/><line x1="1" y1="1" x2="23" y2="23"/>`;
                } else {
                    input.setAttribute("type", "password");
                    icon.innerHTML = `<path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/>`;
                }
            });
        }

        setupPasswordToggle("password", "togglePassword", "eyeIcon");
        setupPasswordToggle("confirmPassword", "toggleConfirmPassword", "confirmEyeIcon");

        let currentMode = "register";

        function toggleFormMode(targetMode) {
            currentMode = targetMode;
            const statusBox = document.getElementById("statusBox");
            const subtitle = document.getElementById("mainframeSubtitle");
            const usernameGroup = document.getElementById("usernameGroup");
            const confirmPasswordGroup = document.getElementById("confirmPasswordGroup");
            const passwordLabel = document.getElementById("passwordLabel");
            const submitBtn = document.getElementById("submitActionBtn");
            const footerState = document.getElementById("formFooterState");

            statusBox.style.display = "none";
            document.getElementById("password").value = "";
            document.getElementById("confirmPassword").value = "";

            if (targetMode === "login") {
                subtitle.innerText = "Login to Your Account";
                usernameGroup.style.display = "none";
                confirmPasswordGroup.style.display = "none";
                document.getElementById("username").removeAttribute("required");
                document.getElementById("confirmPassword").removeAttribute("required");
                passwordLabel.innerText = "Password";
                submitBtn.innerText = "Login";
                footerState.innerHTML = `New Users to Zytherion AI? <a class="auth-link" onclick="toggleFormMode('register')">Create New Account</a>`;
            } else {
                subtitle.innerText = "Create New Account";
                usernameGroup.style.display = "block";
                confirmPasswordGroup.style.display = "block";
                document.getElementById("username").setAttribute("required", "true");
                document.getElementById("confirmPassword").setAttribute("required", "true");
                passwordLabel.innerText = "Create Password";
                submitBtn.innerText = "Register";
                footerState.innerHTML = `Already a registered user? <a class="auth-link" onclick="toggleFormMode('login')">Login</a>`;
            }
        }

        toggleFormMode("register");

        async function handleFormSubmission(event) {
            event.preventDefault();
            
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const statusBox = document.getElementById("statusBox");
            
            statusBox.className = "msg-alert";
            statusBox.style.display = "none";

            const BASE_SERVER_URL = "https://aegisai-backend-ifvc.onrender.com";

            if (currentMode === "register") {
                const username = document.getElementById("username").value.trim();
                const confirmPassword = document.getElementById("confirmPassword").value;

                if (password !== confirmPassword) {
                    statusBox.innerText = "Validation Failed: Passkey entries mismatch. Both passphrases must be identical.";
                    statusBox.classList.add("error");
                    statusBox.style.display = "block";
                    return;
                }

                const minLength = password.length >= 8;
                const hasUppercase = /[A-Z]/.test(password);
                const hasLowercase = /[a-z]/.test(password);
                const hasDigit = /[0-9]/.test(password);
                const hasSpecial = /[^A-Za-z0-9]/.test(password);

                if (!minLength || !hasUppercase || !hasLowercase || !hasDigit || !hasSpecial) {
                    statusBox.innerText = "Security Rule Error: Passkey must have a minimum of 8 characters, including 1 uppercase, 1 lowercase, 1 numeric digit, and 1 special symbol character attribute.";
                    statusBox.classList.add("error");
                    statusBox.style.display = "block";
                    return;
                }

                try {
                    const response = await fetch(`${BASE_SERVER_URL}/api/auth/register`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ username, email, password })
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.message || "Registration operation rejected.");

                    statusBox.innerText = "Account Created successfully. Loading secure verification panel layers...";
                    statusBox.classList.add("success");
                    statusBox.style.display = "block";

                    setTimeout(() => { toggleFormMode("login"); }, 2000);

                } catch (error) {
                    statusBox.innerText = "Registration Intercept Failure: " + error.message;
                    statusBox.classList.add("error");
                    statusBox.style.display = "block";
                }

            } else {
                try {
                    const response = await fetch(`${BASE_SERVER_URL}/api/auth/login`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.message || "Invalid credential credentials profile matching sequence.");

                    localStorage.setItem("token", data.token);
                    window.location.href = "index.html";

                } catch (error) {
                    statusBox.innerText = "Access Validation Error: " + error.message;
                    statusBox.classList.add("error");
                    statusBox.style.display = "block";
                }
            }
        }
    </script>
</body>
</html>
