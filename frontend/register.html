<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zytherion AI - Provision Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Provision Profile</h2>
    <p class="auth-subtitle">Configure an authorized credentials profile for this access point.</p>

    <div class="input-group">
      <label for="email">Designated Email</label>
      <input type="email" id="email" class="auth-input" placeholder="operator@domain.com" autocomplete="off" />
    </div>

    <div class="input-group">
      <label for="password">Generate Secure Passkey</label>
      <input type="password" id="password" class="auth-input" placeholder="••••••••" />
    </div>

    <button onclick="register()" class="auth-btn">Build System Access Profile</button>

    <p class="auth-footer">Already provisioned? <a href="login.html">Decrypt Clearance</a></p>
  </div>
</div>

<script>
async function register() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Provision notice: Credentials cannot be empty.");
    return;
  }

  try {
    const res = await fetch("https://aegisai-backend-ifvc.onrender.com/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok || data.message === "User registered successfully") {
      alert("Profile generated successfully. Transferred to authentication port.");
      window.location.href = "login.html";
    } else {
      alert(data.message || "Provision error: Profile allocation anomaly detected.");
    }
  } catch(e) {
    alert("Matrix interface dropped: Server did not respond.");
  }
}
</script>

</body>
</html>
