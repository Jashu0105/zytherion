<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zytherion Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Zytherion Registration</h2>
    <p class="auth-subtitle">Create a secure profile to start initializing your customized AI interface.</p>

    <form id="register-form">
      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="auth-input" placeholder="name@example.com" autocomplete="email" required />
      </div>

      <div class="input-group">
        <label for="password">Create Password</label>
        <input type="password" id="password" class="auth-input" placeholder="••••••••" autocomplete="new-password" required />
      </div>

      <button type="submit" class="auth-btn">Create Account</button>
    </form>

    <p class="auth-footer">Already have an account? <a href="login.html">Sign in here</a></p>
  </div>
</div>

<script>
document.getElementById("register-form").addEventListener("submit", function (event) {
  event.preventDefault();
  register();
});

async function register() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Please complete all registration fields.");
    return;
  }

  try {
    const res = await fetch("https://aegisai-backend-ifvc.onrender.com/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok || data.message === "User registered successfully") {
      alert("Registration successful! Redirecting to login window.");
      window.location.href = "login.html";
    } else {
      alert(data.message || "Registration encountered an issue.");
    }
  } catch(e) {
    alert("Connection error. Could not reach registration terminal server.");
  }
}
</script>

</body>
</html>
